services:
  - type: web
    name: intern-scout-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: intern-scout-db
          property: connectionString
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: DEMO_USER_PASSWORD
        sync: false
      - key: LOAD_DEMO_SEEDS
        value: "true"

databases:
  - name: intern-scout-db
    plan: free
    databaseName: intern_scout_production
    user: intern_scout
